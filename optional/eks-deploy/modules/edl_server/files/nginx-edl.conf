# nginx site for /edl/ — serves PAN-OS External Dynamic List files over HTTP.
# The EDL server lives in the MGMT VPC; FWs pull EDLs from here via the TGW
# mgmt path. ${MGMT_CIDR} is substituted by cloud-init from the security VPC
# CIDR (where the FW mgmt interfaces live).
server {
    listen 80 default_server;
    server_name _;
    access_log /var/log/nginx/edl-access.log;

    location = / {
        default_type text/plain;
        return 200 "eks-edl server\n  /edl/eks-egress-fqdn.txt\n  /edl/eks-egress-ips.txt\n";
    }
    location /edl/ {
        alias /var/www/html/edl/;
        default_type text/plain;
        add_header X-Robots-Tag "noindex, nofollow" always;
        allow ${MGMT_CIDR};
        allow 127.0.0.1;
        deny all;
        try_files $uri =503;
    }
}
